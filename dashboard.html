<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Grupo Panini 2026</title>
  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#071018;
      color:#f4f7fb;
      padding:18px;
    }

    .wrap{
      max-width:720px;
      margin:auto;
    }

    h1{
      text-align:center;
      color:#f7c948;
      margin-bottom:8px;
    }

    .sub{
      text-align:center;
      color:#9fb0c3;
      margin-bottom:18px;
      font-size:14px;
    }

    .card{
      background:#101c28dd;
      border:1px solid rgba(255,255,255,.12);
      border-radius:22px;
      padding:16px;
      margin:12px 0;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 80px;
      gap:10px;
      align-items:center;
    }

    .name{
      font-weight:800;
      font-size:18px;
    }

    .muted{
      color:#9fb0c3;
      font-size:13px;
    }

    .progress{
      height:12px;
      background:#08131e;
      border-radius:999px;
      overflow:hidden;
      margin-top:10px;
    }

    .bar{
      height:100%;
      background:linear-gradient(135deg,#f7c948,#f59e0b);
    }

    button{
      width:100%;
      border:0;
      border-radius:16px;
      padding:14px;
      font-weight:800;
      background:linear-gradient(135deg,#f7c948,#f59e0b);
      color:#111827;
      margin-top:12px;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Dashboard Grupo Panini 2026</h1>
    <div class="sub">Estado general de Daniel, Jose, Juan y Elsa</div>

    <div id="contenedor"></div>

    <button onclick="cargar()">Actualizar dashboard</button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzEF_FVY3_19EnEeqrEynAIrk3jZe52RGteKPwg-23PCoisvfwXE5-wbtDJP1mjBfk/exec";

    async function cargar(){
      const cont = document.getElementById("contenedor");

      if(API_URL.includes("PEGA_AQUI")){
        cont.innerHTML = "<div class='card'>Primero pega la URL de Apps Script en API_URL.</div>";
        return;
      }

      try{
        const res = await fetch(`${API_URL}?action=grupo`);
        const json = await res.json();

        if(!json.ok){
          cont.innerHTML = "<div class='card'>Error cargando dashboard.</div>";
          return;
        }

        cont.innerHTML = json.data.map(u => `
          <div class="card">
            <div class="row">
              <div>
                <div class="name">${u.usuario}</div>
                <div class="muted">${u.pegadas} pegadas · ${u.faltantes} faltantes · ${u.repetidas} repetidas</div>
              </div>
              <div>${u.porcentaje}%</div>
            </div>

            <div class="progress">
              <div class="bar" style="width:${u.porcentaje}%"></div>
            </div>
          </div>
        `).join("");
      }catch(e){
        cont.innerHTML = "<div class='card'>No se pudo conectar con Apps Script.</div>";
      }
    }

    cargar();
    setInterval(cargar, 15000);
  </script>
</body>
</html>
