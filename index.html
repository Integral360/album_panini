<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini PRO V3</title>

<style>
body{font-family:Arial;background:#071018;color:#fff;margin:0;padding:10px}
.group,.team{border:1px solid #333;border-radius:12px;margin:8px 0}
.group-head,.team-head{padding:12px;cursor:pointer;display:flex;justify-content:space-between}
.stickers{display:none;grid-template-columns:repeat(5,1fr);gap:5px;padding:10px}
.team.open .stickers{display:grid}
.group.open .group-body{display:block}
.group-body{display:none;padding:10px}
.sticker{padding:10px;text-align:center;border-radius:8px;background:#263244;cursor:pointer}
.sticker.owned{background:#16a34a}
.sticker.repeat{background:#f7c948;color:#000}
.topbar{display:flex;justify-content:space-between;margin-bottom:10px}
button{padding:10px;border-radius:8px;border:none;cursor:pointer}
</style>
</head>

<body>

<div class="topbar">
<button onclick="toggleModo()">Modo: <span id="modoTxt">sumar</span></button>
<button onclick="mostrarRepetidas()">Ver repetidas</button>
</div>

<div id="contenedor"></div>

<div id="repetidas" style="display:none">
<h2>Repetidas</h2>
<div id="listaRepetidas"></div>
<button onclick="volver()">Volver</button>
</div>

<script>

const grupos = {
G:[["BEL","Bélgica"],["EGY","Egipto"],["IRN","Irán"],["NZL","N. Zelanda"]],
};

let inventario = {};
let cambios = {};
let modo="sumar";

function codigo(c,n){return c+" "+n}
function cantidad(c){return cambios[c] ?? inventario[c] ?? 0}

function render(){
const cont=document.getElementById("contenedor");
let html="";

for(const [g,teams] of Object.entries(grupos)){
html+=`<div class="group" data-group="${g}">
<div class="group-head" onclick="abrirGrupo(this)">Grupo ${g}</div>
<div class="group-body">`;

teams.forEach(([code,name])=>{

let pegadas=0;
let repetidas=0;

for(let i=1;i<=20;i++){
let q=cantidad(codigo(code,i));
if(q>=1)pegadas++;
if(q>=2)repetidas+=q-1;
}

html+=`<div class="team" data-code="${code}">
<div class="team-head" onclick="abrirEquipo(this)">
<span>${name}</span>
<span>${pegadas}/20 | 🔁${repetidas}</span>
</div>
<div class="stickers">`;

for(let i=1;i<=20;i++){
let cod=codigo(code,i);
let q=cantidad(cod);
html+=`<div class="sticker ${q==1?"owned":q>1?"repeat":""}" onclick="clickFicha('${cod}')">
${code} ${i}<br>${q}
</div>`;
}

html+=`</div></div>`;
});

html+=`</div></div>`;
}

cont.innerHTML=html;
}

function abrirGrupo(el){
el.parentElement.classList.toggle("open");
}

function abrirEquipo(el){
el.parentElement.classList.toggle("open");
}

function clickFicha(c){
let q=cantidad(c);
cambios[c]= modo=="sumar"?q+1:Math.max(0,q-1);
render();
}

function toggleModo(){
modo=modo=="sumar"?"restar":"sumar";
document.getElementById("modoTxt").innerText=modo;
}

function mostrarRepetidas(){
document.getElementById("contenedor").style.display="none";
document.getElementById("repetidas").style.display="block";

let lista=document.getElementById("listaRepetidas");
let html="";

Object.keys({...inventario,...cambios}).forEach(c=>{
let q=cantidad(c);
if(q>=2){
html+=`<div onclick="restar('${c}')">${c} (${q})</div>`;
}
});

lista.innerHTML=html;
}

function restar(c){
cambios[c]=Math.max(0,cantidad(c)-1);
mostrarRepetidas();
}

function volver(){
document.getElementById("repetidas").style.display="none";
document.getElementById("contenedor").style.display="block";
render();
}

render();

</script>
</body>
</html>
